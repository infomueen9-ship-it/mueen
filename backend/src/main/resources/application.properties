# ── Database ──────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/mueen_db
spring.datasource.username=mueen_user
spring.datasource.password=mueen_pass_2024
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ───────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=public

# ── Flyway ────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/public
spring.flyway.schemas=public
spring.flyway.baseline-on-migrate=true

# ── Redis ─────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# ── Server ────────────────────────────────────
server.port=8082

# ── JWT ───────────────────────────────────────
app.jwt.secret=mueen_jwt_secret_key_2024_very_long_string_min_256_bits
app.jwt.expiration=86400000

app.bootstrap.admin.enabled=true
app.bootstrap.admin.email=admin@mueen.com
app.bootstrap.admin.password=admin123
app.bootstrap.admin.name=Super Admin

logging.level.com.mueen=DEBUG
logging.level.org.springframework.jdbc=DEBUG
server.servlet.context-path=
